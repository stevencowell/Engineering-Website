<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Input process output feedback diagram</title>
  <desc id="desc">A visual explanation of input, process, output and feedback for an automatic watering system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7fbff"/><stop offset="1" stop-color="#e7f6ef"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#0056b3"/></marker>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <text x="60" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#143c34">Input -> Process -> Output</text>
  <text x="62" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#49645e">Use this language in every folio explanation.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="75" y="210" width="260" height="210" rx="22" fill="#ffffff" stroke="#89a8d8" stroke-width="4"/>
    <text x="115" y="265" font-size="31" font-weight="800" fill="#0056b3">1. INPUT</text>
    <text x="115" y="312" font-size="22" fill="#1f2a3d">What does the</text>
    <text x="115" y="342" font-size="22" fill="#1f2a3d">system detect?</text>
    <text x="115" y="385" font-size="20" fill="#49645e">Dry soil, rain,</text>
    <text x="115" y="412" font-size="20" fill="#49645e">button, timer</text>

    <rect x="470" y="210" width="260" height="210" rx="22" fill="#ffffff" stroke="#8fc99e" stroke-width="4"/>
    <text x="510" y="265" font-size="31" font-weight="800" fill="#0a7e2a">2. PROCESS</text>
    <text x="510" y="312" font-size="22" fill="#1f2a3d">What decision</text>
    <text x="510" y="342" font-size="22" fill="#1f2a3d">is made?</text>
    <text x="510" y="385" font-size="20" fill="#49645e">Algorithm, relay,</text>
    <text x="510" y="412" font-size="20" fill="#49645e">controller logic</text>

    <rect x="865" y="210" width="260" height="210" rx="22" fill="#ffffff" stroke="#e0a39c" stroke-width="4"/>
    <text x="905" y="265" font-size="31" font-weight="800" fill="#8b332b">3. OUTPUT</text>
    <text x="905" y="312" font-size="22" fill="#1f2a3d">What action</text>
    <text x="905" y="342" font-size="22" fill="#1f2a3d">happens?</text>
    <text x="905" y="385" font-size="20" fill="#49645e">Pump runs, valve</text>
    <text x="905" y="412" font-size="20" fill="#49645e">opens, LED shows</text>
  </g>
  <path d="M350 315h95" stroke="#0056b3" stroke-width="9" marker-end="url(#arrow)"/>
  <path d="M745 315h95" stroke="#0056b3" stroke-width="9" marker-end="url(#arrow)"/>
  <path d="M995 440c-20 155-720 155-790 0" stroke="#0a7e2a" stroke-width="8" stroke-dasharray="18 14" fill="none" marker-end="url(#arrow)"/>
  <rect x="360" y="570" width="480" height="115" rx="22" fill="#fffdf2" stroke="#cdbb74" stroke-width="3"/>
  <text x="398" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#856404">4. FEEDBACK</text>
  <text x="398" y="655" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2a3d">Use the result to improve the next decision.</text>
</svg>
