<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Water control system prototype illustration</title>
  <desc id="desc">A clean illustration of a garden watering control system with reservoir, tubing, controller, sensor and plant tray.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eaf3ff"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" x2="1">
      <stop offset="0" stop-color="#d9b074"/>
      <stop offset="1" stop-color="#f1d09a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9de8ff" stop-opacity=".9"/>
      <stop offset="1" stop-color="#2f9ed0" stop-opacity=".85"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#123" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="24" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <path d="M140 520h920l-70 80H210z" fill="url(#wood)" stroke="#b88343" stroke-width="4"/>
    <path d="M210 600h780" stroke="#b88343" stroke-width="4" opacity=".5"/>
  </g>

  <!-- Reservoir -->
  <g transform="translate(210 250)">
    <rect x="0" y="80" width="190" height="190" rx="12" fill="#e9f7ff" stroke="#2f6f8f" stroke-width="5"/>
    <rect x="12" y="155" width="166" height="100" rx="8" fill="url(#water)" opacity=".85"/>
    <rect x="34" y="36" width="122" height="56" rx="12" fill="#24445c"/>
    <circle cx="64" cy="64" r="18" fill="#111827"/>
    <circle cx="126" cy="64" r="18" fill="#111827"/>
    <text x="95" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2a3d">Reservoir</text>
  </g>

  <!-- Controller board -->
  <g transform="translate(500 355)">
    <rect x="0" y="0" width="210" height="130" rx="14" fill="#174e3b" stroke="#0b2f25" stroke-width="5"/>
    <rect x="22" y="22" width="60" height="46" rx="6" fill="#111827"/>
    <rect x="104" y="24" width="78" height="36" rx="6" fill="#2563eb"/>
    <circle cx="38" cy="98" r="10" fill="#ef4444"/>
    <circle cx="72" cy="98" r="10" fill="#fbbf24"/>
    <circle cx="106" cy="98" r="10" fill="#22c55e"/>
    <circle cx="158" cy="94" r="14" fill="#d1d5db"/>
    <text x="105" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2a3d">Controller</text>
  </g>

  <!-- Plant tray -->
  <g transform="translate(790 320)">
    <rect x="0" y="85" width="250" height="105" rx="18" fill="#273238" stroke="#111827" stroke-width="5"/>
    <rect x="16" y="78" width="218" height="44" rx="20" fill="#3b2a1d"/>
    <g stroke="#17803d" stroke-width="8" stroke-linecap="round" fill="none">
      <path d="M58 80c0-40 12-62 34-84"/>
      <path d="M122 80c-2-46 18-76 48-100"/>
      <path d="M186 80c4-34 22-55 48-70"/>
    </g>
    <g fill="#31a852">
      <ellipse cx="74" cy="30" rx="28" ry="14" transform="rotate(-25 74 30)"/>
      <ellipse cx="108" cy="20" rx="30" ry="14" transform="rotate(25 108 20)"/>
      <ellipse cx="150" cy="-10" rx="30" ry="15" transform="rotate(-20 150 -10)"/>
      <ellipse cx="190" cy="-6" rx="30" ry="15" transform="rotate(24 190 -6)"/>
      <ellipse cx="214" cy="34" rx="26" ry="13" transform="rotate(20 214 34)"/>
    </g>
    <text x="125" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2a3d">Plant tray</text>
  </g>

  <!-- Moisture sensor -->
  <g transform="translate(720 245)">
    <rect x="0" y="0" width="56" height="145" rx="10" fill="#d6a552" stroke="#8b5e24" stroke-width="5"/>
    <line x1="15" y1="42" x2="41" y2="42" stroke="#8b5e24" stroke-width="5"/>
    <line x1="15" y1="72" x2="41" y2="72" stroke="#8b5e24" stroke-width="5"/>
    <line x1="15" y1="102" x2="41" y2="102" stroke="#8b5e24" stroke-width="5"/>
    <text x="28" y="-18" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2a3d">Sensor</text>
  </g>

  <!-- Pump -->
  <g transform="translate(410 410)">
    <rect x="0" y="0" width="70" height="58" rx="12" fill="#111827"/>
    <circle cx="35" cy="29" r="18" fill="#4b5563"/>
    <text x="35" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2a3d">Pump</text>
  </g>

  <!-- Tubing -->
  <path d="M335 314c70-110 190-112 250-42 46 54 25 120 107 142 50 13 109-4 152-35"
        fill="none" stroke="#2f9ed0" stroke-width="18" stroke-linecap="round" opacity=".9"/>
  <path d="M398 415c-26-60-34-96-16-126 22-38 64-36 92-8"
        fill="none" stroke="#2f9ed0" stroke-width="16" stroke-linecap="round" opacity=".9"/>

  <!-- Signal wires -->
  <path d="M556 398c-42-56-84-66-137-42" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
  <path d="M600 398c33-72 64-105 146-95" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <path d="M670 418c78-16 132-6 176 42" fill="none" stroke="#111827" stroke-width="8" stroke-linecap="round"/>

  <!-- Flow arrows -->
  <g fill="#0056b3">
    <path d="M570 268l36 8-28 24z"/>
    <path d="M820 386l36 8-28 24z"/>
  </g>

  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="22" fill="#5c667a">
    <text x="570" y="225">water path</text>
    <text x="585" y="540">low-voltage control wiring</text>
  </g>
</svg>
