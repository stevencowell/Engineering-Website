<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Electrical testing setup</title>
  <desc id="desc">Infographic showing safe low voltage testing of generator, USB module, multimeter and test load.</desc>
  <rect width="1200" height="760" rx="28" fill="#eef7ff"/>
  <text x="60" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#10243b">Safe electrical testing</text>
  <text x="60" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#53637a">Teacher-check wiring before connecting any USB device. No smoke tests. We are not inventing sadness.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="80" y="185" width="1040" height="360" rx="22" fill="#fff" stroke="#c7d7e8" stroke-width="3"/>
    <rect x="120" y="250" width="170" height="130" rx="18" fill="#0a7e2a"/>
    <circle cx="205" cy="315" r="34" fill="#e8f7ee" stroke="#064e1b" stroke-width="7"/>
    <text x="205" y="425" text-anchor="middle" font-size="24" font-weight="800" fill="#10243b">Generator</text>
    <rect x="410" y="250" width="165" height="130" rx="18" fill="#10243b"/>
    <rect x="447" y="278" width="90" height="28" rx="5" fill="#e8f2ff"/>
    <rect x="461" y="333" width="62" height="31" rx="5" fill="#f59e0b"/>
    <text x="493" y="425" text-anchor="middle" font-size="24" font-weight="800" fill="#10243b">USB module</text>
    <rect x="692" y="230" width="180" height="170" rx="24" fill="#f8fafc" stroke="#334155" stroke-width="6"/>
    <rect x="727" y="258" width="110" height="46" rx="7" fill="#dff7e8"/>
    <text x="782" y="290" text-anchor="middle" font-size="24" font-weight="800" fill="#0a7e2a">V</text>
    <circle cx="754" cy="344" r="13" fill="#dc2626"/>
    <circle cx="812" cy="344" r="13" fill="#111827"/>
    <text x="782" y="425" text-anchor="middle" font-size="24" font-weight="800" fill="#10243b">Multimeter</text>
    <rect x="962" y="250" width="86" height="145" rx="16" fill="#1f2a3d"/>
    <rect x="974" y="268" width="62" height="95" rx="6" fill="#dff7e8"/>
    <text x="1005" y="425" text-anchor="middle" font-size="24" font-weight="800" fill="#10243b">Test load</text>
    <path d="M290 315 H410" stroke="#dc2626" stroke-width="8" fill="none"/>
    <path d="M290 348 H410" stroke="#111827" stroke-width="8" fill="none"/>
    <path d="M575 315 H692" stroke="#dc2626" stroke-width="8" fill="none"/>
    <path d="M575 348 H692" stroke="#111827" stroke-width="8" fill="none"/>
    <path d="M872 323 H962" stroke="#0b63c3" stroke-width="8" fill="none"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="22">
    <rect x="110" y="590" width="300" height="78" rx="16" fill="#fff4f1" stroke="#c7968e" stroke-width="3"/>
    <text x="135" y="622" font-weight="800" fill="#8b332b">Check polarity</text>
    <text x="135" y="653" fill="#53637a">Positive and negative leads.</text>
    <rect x="450" y="590" width="300" height="78" rx="16" fill="#fff7ed" stroke="#f0b35a" stroke-width="3"/>
    <text x="475" y="622" font-weight="800" fill="#9a5b00">Measure first</text>
    <text x="475" y="653" fill="#53637a">Voltage before USB load.</text>
    <rect x="790" y="590" width="300" height="78" rx="16" fill="#eef8f1" stroke="#8bb89a" stroke-width="3"/>
    <text x="815" y="622" font-weight="800" fill="#0a7e2a">Record faults</text>
    <text x="815" y="653" fill="#53637a">Loose wires, low rpm, wobble.</text>
  </g>
</svg>
