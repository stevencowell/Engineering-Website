<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Wind powered USB charger energy pathway</title>
  <desc id="desc">Infographic showing wind energy moving through blades, shaft, generator, USB regulator and phone output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#eef8f1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#12304a" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#0b63c3"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>
  <text x="60" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#10243b">Energy pathway</text>
  <text x="60" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#53637a">Wind movement is converted into a safer, useful USB output.</text>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(60 210)">
      <rect width="170" height="250" rx="18" fill="#fff" stroke="#c7d7e8" stroke-width="3"/>
      <path d="M35 52 C95 18 142 32 154 80 C102 86 68 92 35 52Z" fill="#8ed6ff"/>
      <path d="M36 114 C96 82 143 96 155 144 C102 150 69 154 36 114Z" fill="#8ed6ff" opacity=".85"/>
      <path d="M34 176 C94 145 143 159 155 207 C104 212 69 216 34 176Z" fill="#8ed6ff" opacity=".7"/>
      <text x="85" y="300" text-anchor="middle" font-size="25" font-weight="800" fill="#0b3d6b">Wind</text>
      <text x="85" y="332" text-anchor="middle" font-size="19" fill="#53637a">moving air</text>
    </g>

    <g transform="translate(275 210)">
      <rect width="170" height="250" rx="18" fill="#fff" stroke="#c7d7e8" stroke-width="3"/>
      <circle cx="85" cy="105" r="24" fill="#0b63c3"/>
      <path d="M85 105 L85 28 C132 42 140 74 85 105Z" fill="#f59e0b"/>
      <path d="M85 105 L151 143 C116 177 83 165 85 105Z" fill="#f59e0b"/>
      <path d="M85 105 L20 144 C10 95 32 70 85 105Z" fill="#f59e0b"/>
      <line x1="85" y1="105" x2="85" y2="196" stroke="#1f2a3d" stroke-width="10" stroke-linecap="round"/>
      <text x="85" y="300" text-anchor="middle" font-size="25" font-weight="800" fill="#0b3d6b">Impellor</text>
      <text x="85" y="332" text-anchor="middle" font-size="19" fill="#53637a">rotates shaft</text>
    </g>

    <g transform="translate(490 210)">
      <rect width="170" height="250" rx="18" fill="#fff" stroke="#c7d7e8" stroke-width="3"/>
      <rect x="42" y="64" width="86" height="88" rx="16" fill="#0a7e2a"/>
      <circle cx="85" cy="108" r="23" fill="#e8f7ee" stroke="#0e5f24" stroke-width="6"/>
      <line x1="85" y1="26" x2="85" y2="64" stroke="#1f2a3d" stroke-width="10" stroke-linecap="round"/>
      <path d="M50 178 C72 156 96 202 121 177" fill="none" stroke="#0b63c3" stroke-width="8" stroke-linecap="round"/>
      <text x="85" y="300" text-anchor="middle" font-size="25" font-weight="800" fill="#0b3d6b">Generator</text>
      <text x="85" y="332" text-anchor="middle" font-size="19" fill="#53637a">makes voltage</text>
    </g>

    <g transform="translate(705 210)">
      <rect width="170" height="250" rx="18" fill="#fff" stroke="#c7d7e8" stroke-width="3"/>
      <rect x="44" y="62" width="82" height="104" rx="12" fill="#10243b"/>
      <rect x="62" y="78" width="46" height="22" rx="4" fill="#e8f2ff"/>
      <path d="M67 131 h36 v22 h-36z" fill="#f59e0b"/>
      <text x="85" y="300" text-anchor="middle" font-size="25" font-weight="800" fill="#0b3d6b">USB unit</text>
      <text x="85" y="332" text-anchor="middle" font-size="19" fill="#53637a">regulates output</text>
    </g>

    <g transform="translate(920 210)">
      <rect width="190" height="250" rx="18" fill="#fff" stroke="#c7d7e8" stroke-width="3"/>
      <rect x="64" y="42" width="70" height="136" rx="12" fill="#1f2a3d"/>
      <rect x="72" y="56" width="54" height="100" rx="5" fill="#dff7e8"/>
      <path d="M87 128 h20 l-10 23 h22" fill="none" stroke="#0a7e2a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="95" y="300" text-anchor="middle" font-size="25" font-weight="800" fill="#0b3d6b">USB load</text>
      <text x="95" y="332" text-anchor="middle" font-size="19" fill="#53637a">test device</text>
    </g>
  </g>

  <g stroke="#0b63c3" stroke-width="8" fill="none" marker-end="url(#arrow)" opacity=".92">
    <path d="M238 335 H263"/>
    <path d="M453 335 H478"/>
    <path d="M668 335 H693"/>
    <path d="M883 335 H908"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#10243b">
    <rect x="90" y="575" width="1020" height="92" rx="18" fill="#fff7ed" stroke="#f0b35a" stroke-width="3"/>
    <text x="125" y="625" font-weight="800">Folio point:</text>
    <text x="265" y="625">Explain where energy is lost: blade slip, shaft friction, gear drag, poor alignment and unstable voltage.</text>
  </g>
</svg>
