<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Mechanical drive choices</title>
  <desc id="desc">Infographic comparing direct drive and geared drive for a wind generator project.</desc>
  <rect width="1200" height="760" rx="28" fill="#eef8f1"/>
  <text x="60" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#10243b">Mechanical drive choices</text>
  <text x="60" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#53637a">The shaft must transfer rotation cleanly before the electronics can do anything useful.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(70 180)">
      <rect width="500" height="430" rx="20" fill="#fff" stroke="#b7cfbf" stroke-width="3"/>
      <text x="30" y="55" font-size="31" font-weight="800" fill="#0a7e2a">Direct drive</text>
      <circle cx="145" cy="185" r="24" fill="#10243b"/>
      <path d="M145 185 L145 78 C205 94 214 139 145 185Z" fill="#f59e0b"/>
      <path d="M145 185 L238 238 C188 284 143 266 145 185Z" fill="#f59e0b"/>
      <path d="M145 185 L52 240 C43 168 79 130 145 185Z" fill="#f59e0b"/>
      <line x1="169" y1="185" x2="315" y2="185" stroke="#1f2a3d" stroke-width="13" stroke-linecap="round"/>
      <rect x="315" y="138" width="105" height="94" rx="16" fill="#0b63c3"/>
      <circle cx="367" cy="185" r="25" fill="#e8f2ff" stroke="#083b82" stroke-width="6"/>
      <text x="30" y="320" font-size="23" font-weight="800" fill="#10243b">Best when</text>
      <text x="30" y="354" font-size="21" fill="#53637a">The blades can spin the generator fast enough without gearing.</text>
      <text x="30" y="396" font-size="21" fill="#53637a">Simple, fewer parts, less friction.</text>
    </g>
    <g transform="translate(630 180)">
      <rect width="500" height="430" rx="20" fill="#fff" stroke="#b7cfbf" stroke-width="3"/>
      <text x="30" y="55" font-size="31" font-weight="800" fill="#0a7e2a">Geared drive</text>
      <circle cx="124" cy="185" r="24" fill="#10243b"/>
      <path d="M124 185 L124 78 C184 94 193 139 124 185Z" fill="#f59e0b"/>
      <path d="M124 185 L217 238 C167 284 122 266 124 185Z" fill="#f59e0b"/>
      <path d="M124 185 L31 240 C22 168 58 130 124 185Z" fill="#f59e0b"/>
      <circle cx="257" cy="185" r="56" fill="#e8f7ee" stroke="#0a7e2a" stroke-width="8"/>
      <circle cx="355" cy="185" r="34" fill="#e8f2ff" stroke="#0b63c3" stroke-width="8"/>
      <line x1="389" y1="185" x2="426" y2="185" stroke="#1f2a3d" stroke-width="12" stroke-linecap="round"/>
      <rect x="426" y="145" width="56" height="80" rx="12" fill="#0b63c3"/>
      <text x="30" y="320" font-size="23" font-weight="800" fill="#10243b">Best when</text>
      <text x="30" y="354" font-size="21" fill="#53637a">You need more generator rpm from slower blade rotation.</text>
      <text x="30" y="396" font-size="21" fill="#53637a">Useful, but alignment and friction matter more.</text>
    </g>
  </g>
  <rect x="105" y="650" width="990" height="62" rx="16" fill="#fff7ed" stroke="#f0b35a" stroke-width="3"/>
  <text x="132" y="690" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="800" fill="#10243b">Record in folio:</text>
  <text x="310" y="690" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#53637a">drive type, shaft support, bearing choice, gear ratio if used, faults and fixes.</text>
</svg>
