<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Controlled testing and data</title>
  <desc id="desc">Infographic showing a controlled testing table and comparison graph for wind USB charger output.</desc>
  <rect width="1200" height="760" rx="28" fill="#f8fafc"/>
  <text x="60" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#10243b">Controlled test data</text>
  <text x="60" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#53637a">Fair test: same fan distance, same wind source, one design change at a time.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="180" width="520" height="430" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="105" y="230" font-size="28" font-weight="800" fill="#0b3d91">Test table</text>
    <g font-size="19">
      <rect x="105" y="260" width="420" height="45" fill="#dbeafe"/>
      <text x="124" y="290" font-weight="800" fill="#10243b">Variable</text>
      <text x="260" y="290" font-weight="800" fill="#10243b">Setup</text>
      <text x="405" y="290" font-weight="800" fill="#10243b">Output</text>
      <g fill="#53637a">
        <line x1="105" y1="305" x2="525" y2="305" stroke="#cbd5e1"/>
        <text x="124" y="342">Blade pitch</text><text x="260" y="342">20 deg</text><text x="405" y="342">2.1 V</text>
        <line x1="105" y1="362" x2="525" y2="362" stroke="#cbd5e1"/>
        <text x="124" y="399">Blade pitch</text><text x="260" y="399">35 deg</text><text x="405" y="399">3.4 V</text>
        <line x1="105" y1="419" x2="525" y2="419" stroke="#cbd5e1"/>
        <text x="124" y="456">Blade pitch</text><text x="260" y="456">50 deg</text><text x="405" y="456">2.8 V</text>
        <line x1="105" y1="476" x2="525" y2="476" stroke="#cbd5e1"/>
        <text x="124" y="513">Best setup</text><text x="260" y="513">35 deg</text><text x="405" y="513">retest</text>
      </g>
      <line x1="235" y1="260" x2="235" y2="532" stroke="#cbd5e1"/>
      <line x1="380" y1="260" x2="380" y2="532" stroke="#cbd5e1"/>
    </g>
    <rect x="650" y="180" width="480" height="430" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="690" y="230" font-size="28" font-weight="800" fill="#0b3d91">Graph the result</text>
    <line x1="715" y1="515" x2="1065" y2="515" stroke="#334155" stroke-width="5"/>
    <line x1="715" y1="515" x2="715" y2="285" stroke="#334155" stroke-width="5"/>
    <rect x="765" y="390" width="48" height="125" fill="#8ed6ff"/>
    <rect x="880" y="310" width="48" height="205" fill="#0a7e2a"/>
    <rect x="995" y="350" width="48" height="165" fill="#f59e0b"/>
    <text x="789" y="552" text-anchor="middle" font-size="18" fill="#53637a">20 deg</text>
    <text x="904" y="552" text-anchor="middle" font-size="18" fill="#53637a">35 deg</text>
    <text x="1019" y="552" text-anchor="middle" font-size="18" fill="#53637a">50 deg</text>
    <text x="665" y="300" font-size="18" fill="#53637a">V</text>
    <text x="808" y="380" text-anchor="middle" font-size="19" font-weight="800" fill="#10243b">2.1</text>
    <text x="923" y="300" text-anchor="middle" font-size="19" font-weight="800" fill="#10243b">3.4</text>
    <text x="1038" y="340" text-anchor="middle" font-size="19" font-weight="800" fill="#10243b">2.8</text>
  </g>
  <rect x="120" y="650" width="960" height="62" rx="16" fill="#eef8f1" stroke="#8bb89a" stroke-width="3"/>
  <text x="150" y="690" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="800" fill="#10243b">Folio claim:</text>
  <text x="292" y="690" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#53637a">The best design was _____ because the test data showed _____.</text>
</svg>
