<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Students building a wind powered USB charger prototype</title>
  <desc id="desc">Two students at a workshop bench assembling and testing a wind powered USB charger prototype with a fan, impellor, generator and phone.</desc>
  <defs>
