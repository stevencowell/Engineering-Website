<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Garden Watering System Slide 8</title>
  <style>
    :root { color-scheme: light; --bg: #0b3a33; --frame: #4f8d7d; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 0%, #176d5c 0%, var(--bg) 60%);
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .slide {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 0.9fr;
      gap: 12px;
      padding: 14px;
      box-sizing: border-box;
      color: #f3fff9;
    }
    .copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }
    .kicker {
      width: fit-content;
      border: 1px solid #dcefe7;
      border-radius: 6px;
      padding: 3px 7px;
      color: #dff7ec;
      font-size: clamp(0.46rem, 1.1vw, 0.72rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1;
    }
    h1 {
      margin: 0;
      color: #fff;
      font-size: clamp(0.95rem, 2.9vw, 1.75rem);
      line-height: 1.12;
    }
    p {
      margin: 0;
      color: #dff7ec;
      font-size: clamp(0.68rem, 1.5vw, 0.95rem);
      font-weight: 700;
    }
    ul {
      margin: 0;
      padding-left: 1rem;
      color: #f5fff9;
      font-size: clamp(0.62rem, 1.35vw, 0.9rem);
      line-height: 1.25;
    }
    li + li { margin-top: 0.12rem; }
    .media {
      display: grid;
      place-items: center;
      min-width: 0;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border: 2px solid var(--frame);
      border-radius: 8px;
      background: #f8fffb;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="copy">
      <div class="kicker">Year 10 Engineering</div>
      <h1>8. Prototype Build Log</h1>
      <p>Garden Watering System Portfolio</p>
      <ul><li>Record build steps.</li><li>Add photos of key stages.</li><li>Explain problems and fixes.</li></ul>
    </div>
    <div class="media">
      <img src="../images/year10-garden-watering/students-building-garden-watering-system.png" alt="Prototype Build Log visual for the garden watering system portfolio" loading="lazy" />
    </div>
  </div>
</body>
</html>
